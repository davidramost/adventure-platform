# =============================================
# PERFIL: DESARROLLO LOCAL (TiDB Cloud)
# =============================================
# Activar con: spring.profiles.active=dev
# Este perfil contiene credenciales hardcoded para desarrollo local SOLAMENTE
# NO COMPARTIR ESTOS VALORES EN GIT
# === DATABASE (TiDB Cloud - Dev credentials) ===
spring.datasource.url=jdbc:mysql://gateway01.eu-central-1.prod.aws.tidbcloud.com:4000/rutas_app?useSSL=true&allowPublicKeyRetrieval=false
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# === JWT ===
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
# === HIBERNATE ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# === LOGGING ===
logging.level.root=INFO
logging.level.com.example.tfg_backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.orm.jdbc=DEBUG
