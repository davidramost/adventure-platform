spring.application.name=tfg_backend
# === CARGAR .env PRIMERO ===
spring.config.additional-location=optional:file:./tfg_backend/.env[.properties],optional:file:./.env[.properties]
# === PERFIL ACTIVO (dev para local, prod para producción) ===
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# === JSON ===
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.mapper.default-view-inclusion=false
spring.jackson.deserialization.fail-on-unknown-properties=false
# === JWT ===
jwt.secret=${JWT_SECRET:***JWT_SECRET_REMOVED***}
jwt.expiration=${JWT_EXPIRATION:86400000}
# === DATABASE TiDB Cloud (MySQL compatible) ===
spring.datasource.url=jdbc:mysql://gateway01.eu-central-1.prod.aws.tidbcloud.com:4000/rutas_app?useSSL=true&allowPublicKeyRetrieval=false
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# SSL para TiDB Cloud
spring.ssl.enabled=true
spring.ssl.trust-store-class-path=/etc/ssl/cert.pem
# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# === PHP MAILER (email via hosting compartido) ===
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
php.mailer.url=${PHP_MAILER_URL:http://davidr.cicloflorenciopintado.es/php-mailer/send-email.php}
php.mailer.api-key=${PHP_MAILER_API_KEY:1d6b74aa8dde12142d08adab346b840b4edcdad2fba4e3358fc554d0a8e5da88}
# === APP ===
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

