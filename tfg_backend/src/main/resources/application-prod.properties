# =============================================
# PERFIL: PRODUCCIÓN (Render.com + Environment Variables)
# =============================================
# En producción, TODAS las credenciales vienen de variables de entorno
# Render.com inyecta: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, etc.

# Database (from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging
logging.level.root=WARN
logging.level.com.example.tfg_backend=INFO

# Production security
spring.jpa.open-in-view=false

# === MAIL ===
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# === APP ===
app.mail.from=${MAIL_FROM:densetsuyami@gmail.com}
app.frontend.url=${FRONTEND_URL:https://davidr.cicloflorenciopintado.es}

