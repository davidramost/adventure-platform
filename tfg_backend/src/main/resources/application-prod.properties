# =============================================
# PERFIL: PRODUCCIÓN (Render.com + Environment Variables)
# =============================================
# En producción, TODAS las credenciales vienen de variables de entorno
# Render.com inyecta: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, etc.
# Database (from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Logging
logging.level.root=WARN
logging.level.com.example.tfg_backend=INFO
# Production security
spring.jpa.open-in-view=false
# === PHP MAILER (email via hosting compartido) ===
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
php.mailer.url=${PHP_MAILER_URL:https://davidr.cicloflorenciopintado.es/api/send-email.php}
php.mailer.api-key=${PHP_MAILER_API_KEY:}
# === APP ===
app.frontend.url=${FRONTEND_URL:https://davidr.cicloflorenciopintado.es}

